version: '3.8'

services:
  judge0:
    image: judge0/judge0:latest
    ports:
      - "2358:8080"  # Access at http://localhost:2358
    environment:
      REDIS_URL: "redis://redis:6379"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/judge0"
      SECRET_KEY_BASE: "your_secret_key_here"
      ALLOW_ORIGIN: "*"
    depends_on:
      - redis
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - judge0_db_data:/var/lib/postgresql/data

volumes:
  judge0_db_data: